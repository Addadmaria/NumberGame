<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NumberGame – Historique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="main-page">

<nav class="navbar">
    <div class="nav-brand">
        <a th:href="@{/accueil}" class="nav-back">← Accueil</a>
    </div>
    <div class="nav-center">
        <span class="logo-title" style="font-size:1.1rem;">📜 Historique</span>
    </div>
    <div class="nav-user">
        <span class="nav-username" th:text="${joueur.username}">Joueur</span>
    </div>
</nav>

<div class="game-wrapper">
    <h2 class="section-title" style="margin-top:2rem;">
        Toutes vos parties, <span class="accent" th:text="${joueur.username}">Joueur</span>
    </h2>

    <div th:if="${#lists.isEmpty(parties)}" class="empty-state">
        <p>Aucune partie jouée pour l'instant.</p>
        <a th:href="@{/accueil}" class="btn btn-primary">🎮 Jouer maintenant</a>
    </div>

    <div th:if="${!#lists.isEmpty(parties)}" class="history-table-wrap">
        <table class="history-table">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Niveau</th>
                    <th>Plage</th>
                    <th>Essais</th>
                    <th>Résultat</th>
                    <th>Score</th>
                    <th>Date</th>
                    <th>Statut</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p, stat : ${parties}"
                    th:classappend="${p.enCours} ? ' row-saved' : (${p.gagnee} ? ' row-win' : ' row-lose')">
                    <td th:text="${stat.index + 1}">1</td>
                    <td>
                        <span class="badge-level"
                              th:classappend="${p.niveau == 1} ? ' badge-easy' : (${p.niveau == 2} ? ' badge-medium' : ' badge-hard')"
                              th:text="${p.niveauLabel}">Moyen</span>
                    </td>
                    <td th:text="${p.rangeMin} + '–' + ${p.rangeMax}">1–100</td>
                    <td th:text="${p.essaisUtilises} + '/' + ${p.essaisMax}">0/10</td>
                    <td>
                        <span th:if="${p.enCours}">⏸️ En cours</span>
                        <span th:if="${!p.enCours and p.gagnee}">✅ Gagné</span>
                        <span th:if="${!p.enCours and !p.gagnee}">❌ Perdu</span>
                    </td>
                    <td>
                        <strong th:text="${p.score > 0 ? p.score + ' pts' : '–'}">0</strong>
                    </td>
                    <td th:text="${#temporals.format(p.dateSauvegarde, 'dd/MM/yy HH:mm')}">date</td>
                    <td>
                        <a th:if="${p.enCours}"
                           th:href="@{/jeu/reprendre/{id}(id=${p.id})}"
                           class="btn btn-sm btn-primary">▶ Reprendre</a>
                        <span th:if="${!p.enCours}" class="done-label">Terminée</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div class="section-footer" style="margin-top:2rem;">
        <a th:href="@{/accueil}" class="btn btn-outline">🏠 Retour à l'accueil</a>
    </div>
</div>

</body>
</html>
